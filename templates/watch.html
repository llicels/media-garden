{% extends "base.html" %}

{% block content %}

<div class="flex flex-col items-center">

  <!-- PLAYER -->
  <iframe
    id="player"
    src="{{ content }}"
    class="w-full max-w-5xl aspect-video rounded-xl border border-green-950"
    allowfullscreen>
  </iframe>

  <!-- YOUTUBE FALLBACK -->
  {% if type == "youtube" %}
  <a 
    href="{{ content.replace('embed/', 'watch?v=') }}" 
    target="_blank"
    class="mt-4 text-neutral-400 hover:text-white"
  >
    open on youtube
  </a>
  {% endif %}

  <!-- SERIES CONTROLS -->
  {% if type == "tv" %}
  <div class="mt-6 flex gap-4 items-center">

    <!-- SEASON -->
    <div>
      <label class="text-sm text-green-950">Season</label>
      <select id="seasonSelect" class="bg-lime-100 border border-lime-700 px-2 py-1 rounded">
        {% for s in info %}
        <option value="{{ s[0] }}">{{ s[0] }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- EPISODE -->
    <div>
      <label class="text-sm text-green-950">Episode</label>
      <select id="episodeSelect" class="bg-lime-100 border border-lime-700 px-2 py-1 rounded"></select>
    </div>

  </div>
  {% endif %}

</div>

<script>
(function () {
  const type = "{{ type }}";

  if (type === "tv") {
    const info = {{ info | tojson }};
    const id = "{{ id }}";

    const seasonSelect = document.getElementById("seasonSelect");
    const episodeSelect = document.getElementById("episodeSelect");
    const player = document.getElementById("player");

    function loadEpisodes() {
      const season = parseInt(seasonSelect.value);
      const seasonData = info.find(s => s[0] === season);

      if (!seasonData) return;

      const totalEpisodes = seasonData[1];
      episodeSelect.innerHTML = "";

      for (let i = 1; i <= totalEpisodes; i++) {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = i;
        episodeSelect.appendChild(option);
      }
    }

    function updatePlayer() {
      const season = seasonSelect.value;
      const episode = episodeSelect.value;

      player.src = `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${season}&e=${episode}`;
    }

    seasonSelect.addEventListener("change", () => {
      loadEpisodes();
      updatePlayer();
    });

    episodeSelect.addEventListener("change", updatePlayer);

    loadEpisodes();
    updatePlayer();
  }
})();
</script>

{% endblock %}
