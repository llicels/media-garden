{% extends "base.html" %}

{% block content %}

<div class="max-w-6xl mx-auto">

  <!-- SEARCH -->
  <form method="POST" class="mb-8 flex gap-2">
    <input name="query" placeholder="search youtube..."
      class="flex-1 bg-lime-100 border border-lime-700 px-4 py-2 rounded">
    <button class="bg-lime-100 border border-lime-700 px-4 py-2 rounded">search</button>
  </form>

  <!-- REFRESH -->
  <a href="/youtube/refresh" 
     class="mb-4 inline-block bg-lime-100 border border-lime-700 px-4 py-2 rounded">
    🔄 refresh
  </a>

  {% for section in content %}

  <div class="mb-8">

    <!-- HEADER -->
    <div class="flex justify-between cursor-pointer"
         onclick="toggleCategory('{{ section.category }}')">

      <h2 class="text-lg capitalize text-lime-700">{{ section.category }}</h2>
      <span id="icon-{{ section.category }}">▶</span>
    </div>

    <!-- GRID -->
    <div id="cat-{{ section.category }}" 
         class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">

      {% for item in section.videos %}
      <div class="{% if loop.index > 8 %}hidden extra-{{ section.category }}{% endif %}">

        <div class="card bg-orange-100 rounded-xl p-2">

          <!-- CLICK -->
          <a href="/watch?contentId={{ item.link }}&type=youtube&id={{ item.id }}">
            <img src="{{ item.image }}" class="w-full h-40 object-cover rounded-lg">
            <p class="text-sm mt-2 line-clamp-2 text-green-950">{{ item.title }}</p>
          </a>

          <!-- ACTION -->
          <div class="flex justify-between items-center mt-2">

            <button 
              onclick="saveItem(this)"
              data-id="{{ item.id }}"
              data-title="{{ item.title }}"
              data-image="{{ item.image }}"
              data-link="{{ item.link }}"
              data-type="{{ item.type }}"
              class="text-lg hover:scale-110 transition">
              💾
            </button>

          </div>

        </div>

      </div>
      {% endfor %}

      <!-- LOAD MORE -->
    <button onclick="loadMore('{{ section.category }}')" 
            class="mt-4 px-4 py-2 bg-lime-100 border border-lime-700 rounded">
      load more
    </button>

    </div>

    

  </div>

  {% endfor %}

</div>

<script>
function toggleCategory(category) {
  const el = document.getElementById("cat-" + category);
  const icon = document.getElementById("icon-" + category);

  if (el.classList.contains("hidden")) {
    el.classList.remove("hidden");
    icon.textContent = "▼";
  } else {
    el.classList.add("hidden");
    icon.textContent = "▶";
  }
}

function saveItem(btn) {
  fetch("/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      id: btn.dataset.id,
      title: btn.dataset.title,
      image: btn.dataset.image,
      link: btn.dataset.link,
      type: btn.dataset.type
    })
  }).then(() => {
    btn.textContent = "✅";
  });
}

function removeItem(btn) {
  fetch("/remove", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      id: btn.dataset.id,
      type: btn.dataset.type
    })
  }).then(() => {
    btn.closest(".card").remove();
  });
}

function loadMore(category) {
  const items = document.querySelectorAll(".extra-" + category);

  let shown = 0;

  items.forEach(el => {
    if (el.classList.contains("hidden") && shown < 4) {
      el.classList.remove("hidden");
      shown++;
    }
  });
}
</script>

{% endblock %}
